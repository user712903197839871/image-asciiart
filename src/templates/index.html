<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Syne">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <title>{{ data.title }}</title>
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <div class="input-wrapper">
        <div class="center-div headding-wrapper">
            <h1>Image to text</h1>
            <p class="center-text">
                never built by anyone!<br>
                here you can input your dick pic and see how it would look in text
            </p>
        </div>

        <div class="form-container">
            <form class="art-form" id="img-ascii" enctype="multipart/form-data">
                <div>
                    <label class="custom-file-input" for="user_image">
                        <span id="select-file-button">select a photo</span>
                        <span class="metadata" id="selected-file-text">selected bish</span>
                    </label>
                    <input type="file" name="user_image" id="user_image">
                </div>

                <div class="field-container">
                    <label for="charset_dropdown">Select the character set</label>
                    <select name="charset" id="charset_dropdown">
                        {% for charlist in data.charset %}
                            <option value="{{ charlist[1] }}">{{ charlist[0] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="field-container">
                    <label for="char-limit">Art's size (in characters wide)</label>            
                    <input type="text" placeholder="67" name="char-limit" id="char-limit">

                </div>
                <div class="center-div std-space">
                    <div class="center-div std-space-05">
                        <p class="center-text" id="toggle-char-choose-mode-label"></p>
                        <button class="btn-std" type="button" id="toggle-char-choose-mode"></button>
                    </div>
                    <!-- we make dese invisible using js btw -->
                    <div class="center-div" id="choose-mode-buttons">
                        <span>choose something predefined</span>
                        <!-- could also be autogenerated using jinja -->
                        <fieldset id="char-limit-buttons">
                            <button class="btn-number" type="button">50</button>
                            <button class="btn-number" type="button">20</button>
                            <button class="btn-number" type="button">100</button>
                            <button class="btn-number" type="button">200</button>
                            <button class="btn-number" type="button">400</button>
                        </fieldset>
                    </div>

                    <div class="center-div fill-div" id="choose-mode-slider">
                        <span>slide how much you want</span>
                        <input type="range" min="20" value="65" max="2500" id="char-limit-slider">
                    </div>
                    <input type="submit" value="submit dis">
                </div>
            </form>
        </div>
    </div>

    <div class="bottom-container">
        <div>
            <span class="success metadata" id="art-status">result</span>
        </div>

        <div class="output-container">
            <pre id="output-box">output here...</pre>
        </div>
    </div>

    <script src="../static/main.js"></script>
</body>
</html>
