<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ data.title }}</title>
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <form id="img-ascii" enctype="multipart/form-data">
        <input type="file" name="user_image" id="user_image">
        <select name="charset" id="charset_dropdown">
            {% for charlist in data.charset %}
                <option value="{{ charlist[1] }}">{{ charlist[0] }}</option>
            {% endfor %}
        </select>
        <br>
        <input type="number" value="65" name="char_limit" id="char_limit">
        <input type="range" min="20" value="65" max="2500" id="char_limit_slider">
        <input type="submit" value="submit dis">
    </form>

    <span id="art-status">result</span>

    <pre id="output-box">output here...</pre>

    <script src="../static/main.js"></script>
</body>
</html>
